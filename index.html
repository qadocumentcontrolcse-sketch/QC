<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QC Portal — Catatan Sampling & Pengujian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ---------------------------------------------------------------------
   QC Portal — design tokens
   Palet & tipografi terinspirasi dari form kertas laboratorium QC:
   kertas pucat, tinta arsip, dan "stempel" status kelulusan batch.
--------------------------------------------------------------------- */
:root {
  --paper: #FBFAF5;
  --paper-raised: #FFFFFF;
  --ink: #1C2B39;
  --ink-soft: #4B5C68;
  --rule: #D8D3C8;
  --rule-strong: #B9C2BE;
  --accent-pass: #3E7C6B;
  --accent-pass-bg: #E7F0EC;
  --accent-hold: #C98A3B;
  --accent-hold-bg: #FBF1E3;
  --accent-fail: #A33B33;
  --accent-fail-bg: #F7E9E7;
  --accent-line: #7C8B87;

  --font-display: "Space Grotesk", "IBM Plex Sans", sans-serif;
  --font-body: "IBM Plex Sans", system-ui, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.5;
}

a { color: inherit; }

#app {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* ---------------- Sidebar ---------------- */
.sidebar {
  background: var(--ink);
  color: var(--paper);
  padding: 28px 20px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.brand {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.05rem;
  letter-spacing: 0.02em;
  margin-bottom: 4px;
}
.brand small {
  display: block;
  font-family: var(--font-mono);
  font-weight: 400;
  font-size: 0.7rem;
  color: #9FB3AB;
  letter-spacing: 0.06em;
  margin-top: 4px;
}

.nav-group {
  margin-top: 28px;
}
.nav-group h4 {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: #7C8B87;
  margin: 0 0 8px 2px;
  font-weight: 500;
}
.nav-link {
  display: block;
  padding: 9px 10px;
  border-radius: 4px;
  font-size: 0.88rem;
  color: #E4E9E4;
  text-decoration: none;
  border-left: 2px solid transparent;
  margin-bottom: 2px;
}
.nav-link:hover { background: rgba(255,255,255,0.06); }
.nav-link.active {
  background: rgba(255,255,255,0.09);
  border-left-color: var(--accent-pass);
  color: #fff;
}

/* ---------------- Main content ---------------- */
main {
  padding: 40px 48px;
  max-width: 1180px;
}

.page-head {
  margin-bottom: 28px;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 18px;
}
.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent-line);
}
h1 {
  font-family: var(--font-display);
  font-size: 1.7rem;
  margin: 4px 0 6px;
  font-weight: 600;
}
.doc-meta {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--ink-soft);
}

/* ---------------- Toolbar / filter ---------------- */
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.toolbar input[type="search"] {
  flex: 1;
  min-width: 220px;
  padding: 9px 12px;
  border: 1px solid var(--rule-strong);
  border-radius: 4px;
  background: var(--paper-raised);
  font-family: var(--font-body);
  font-size: 0.9rem;
}
button, .btn {
  font-family: var(--font-body);
  font-size: 0.85rem;
  padding: 9px 14px;
  border-radius: 4px;
  border: 1px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  cursor: pointer;
}
button.ghost {
  background: transparent;
  color: var(--ink);
  border-color: var(--rule-strong);
}
button:hover { opacity: 0.88; }

/* ---------------- List table ---------------- */
table.list {
  width: 100%;
  border-collapse: collapse;
  background: var(--paper-raised);
  font-size: 0.86rem;
}
table.list th {
  text-align: left;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
  border-bottom: 1px solid var(--rule-strong);
  padding: 10px 12px;
  white-space: nowrap;
}
table.list td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule);
  vertical-align: top;
}
table.list tr:hover td { background: #F5F3ED; }
.code {
  font-family: var(--font-mono);
  font-size: 0.82em;
  background: #EFEDE4;
  padding: 1px 6px;
  border-radius: 3px;
}

/* ---------------- Status stamp ---------------- */
.stamp {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 3px;
  border: 1.5px solid currentColor;
  transform: rotate(-1.5deg);
  font-weight: 600;
}
.stamp.pass  { color: var(--accent-pass); background: var(--accent-pass-bg); }
.stamp.hold  { color: var(--accent-hold); background: var(--accent-hold-bg); }
.stamp.fail  { color: var(--accent-fail); background: var(--accent-fail-bg); }
.stamp.none  { color: var(--ink-soft); background: #EFEDE4; border-style: dashed; transform: none; }

/* ---------------- Form / detail view (mirrors dokumen asli) ---------------- */
.form-sheet {
  background: var(--paper-raised);
  border: 1px solid var(--rule-strong);
  padding: 28px 32px;
  margin-bottom: 24px;
  font-family: "Times New Roman", Times, serif;
  font-size: 11pt;
  color: #000;
}
/* Lebar tampilan di layar dibuat sebanding dgn rasio kertas A4 asli (210x297mm),
   supaya konsisten dgn orientasi hasil unduh PDF/Word -- bukan cuma soal ukuran
   unduhan tapi juga bentuk yang terlihat saat di-preview di website. */
.form-sheet.orientation-portrait { max-width: 794px; margin-left: auto; margin-right: auto; }
.form-sheet.orientation-landscape { max-width: 1123px; margin-left: auto; margin-right: auto; }

/* --- Kop (letterhead) resmi: logo + FORMULIR + judul 14pt + info dokumen --- */
table.kop {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
  font-family: "Times New Roman", Times, serif;
  font-size: 11pt;
}
table.kop td {
  border: 1px solid #000;
  padding: 6px 10px;
  vertical-align: middle;
}
table.kop td.kop-logo { width: 130px; text-align: center; vertical-align: top; }
.kop-logo img { max-width: 108px; height: auto; display: block; margin: 0 auto; }
.kop-formulir { font-weight: 700; text-align: center; font-size: 14pt; }
.kop-halaman { font-weight: 700; text-align: center; }
.kop-title { font-weight: 700; font-size: 14pt; text-align: center; }
.kop-info { font-size: 11pt; line-height: 1.5; }
.kop-info-table { border-collapse: collapse; }
table.kop-info-table td { border: none !important; padding: 0 4px 0 0; vertical-align: top; white-space: nowrap; }
.kop-info-table td.kop-info-label { font-weight: 400; }
.kop-info-table td.kop-info-colon { padding: 0 6px; }
.kop-info-table td.kop-info-value { white-space: normal; }
.kop-bagian { font-weight: 700; text-align: center; letter-spacing: 0.02em; }

/* --- Badge status checklist QC Supervisor --- */
.check-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  padding: 5px 11px;
  border-radius: 3px;
  font-weight: 600;
}
.check-badge.checked { background: var(--accent-pass-bg); color: var(--accent-pass); border: 1px solid var(--accent-pass); }
.check-badge.unchecked { background: #EFEDE4; color: var(--ink-soft); border: 1px dashed var(--rule-strong); }

.export-note {
  font-size: 0.8rem;
  color: var(--ink-soft);
  margin-top: 4px;
  max-width: 480px;
}
.sign-block {
  display: flex;
  gap: 30px;
  margin-top: 40px;
  font-family: "Times New Roman", Times, serif;
  font-size: 11pt;
}
.sign-block-center { justify-content: center; }
.sign-block-right { justify-content: flex-end; }
.sign-col { flex: 0 0 220px; text-align: center; }
.sign-space { height: 55px; }
button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.field-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 2px 24px;
  margin-bottom: 18px;
  font-size: 11pt;
}
.field-grid .f { display: flex; gap: 6px; padding: 3px 0; border-bottom: 1px dotted var(--rule); }
.field-grid .f b { color: var(--ink-soft); font-weight: 700; min-width: 160px; }

table.form-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11pt;
  margin-bottom: 14px;
}
.tanggal-sampling-line {
  font-size: 11pt;
  margin: 0 0 8px;
}
table.form-table th, table.form-table td {
  border: 1px solid var(--rule-strong);
  padding: 7px 9px;
  text-align: left;
  vertical-align: top;
}
table.form-table th {
  background: #ffffff;
  font-family: "Times New Roman", Times, serif;
  font-size: 11pt;
  font-weight: 700;
  color: #000;
  text-align: center;
  white-space: nowrap;
}
table.form-table td.num { font-family: "Times New Roman", Times, serif; }
table.form-table th.section-bar, td.section-bar {
  background: #ffffff;
  text-align: center;
  font-weight: 700;
}
table.form-table td.label-cell { font-weight: 700; width: 30%; background: #ffffff; }
table.form-table td.indent { padding-left: 20px; }

/* Tabel lebar (kolom banyak) di-scroll horizontal alih-alih terjepit/berantakan */
.table-scroll {
  overflow-x: auto;
  margin-bottom: 14px;
  -webkit-overflow-scrolling: touch;
}
.table-scroll table.form-table {
  margin-bottom: 0;
}
@media print {
  .table-scroll { overflow-x: visible; }
}

.section-title {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--accent-line);
  margin: 20px 0 8px;
  padding-top: 14px;
  border-top: 1px dashed var(--rule);
}
.section-title:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }

.conclusion {
  margin-top: 16px;
  padding: 10px 14px;
  border: 1px dashed var(--rule-strong);
  font-size: 0.88rem;
  display: flex;
  align-items: center;
  gap: 10px;
}

.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-soft);
  border: 1px dashed var(--rule-strong);
  font-size: 0.9rem;
}

.banner {
  background: var(--accent-hold-bg);
  border: 1px solid var(--accent-hold);
  color: #6B4A1E;
  padding: 12px 16px;
  border-radius: 4px;
  font-size: 0.85rem;
  margin-bottom: 20px;
}

.grid-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin-top: 8px;
}
.card {
  background: var(--paper-raised);
  border: 1px solid var(--rule-strong);
  padding: 16px 18px;
  border-radius: 4px;
}
.card .n {
  font-family: var(--font-display);
  font-size: 1.7rem;
  font-weight: 600;
}
.card .l {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
}

/* ---------------- Print ---------------- */
@media print {
  .sidebar, .toolbar, .no-print { display: none !important; }
  #app { display: block; }
  main { padding: 0; max-width: none; }
  .form-sheet { border: none; padding: 0; }
}

@media (max-width: 860px) {
  #app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  main { padding: 24px; }
  .field-grid { grid-template-columns: 1fr; }
}

</style>
</head>

// Titik override tunggal: versi single-file HTML mengganti fungsi ini supaya
// mengembalikan data ter-embed, bukan fetch ke file terpisah.
async function loadFallback(key) {
  return EMBEDDED_DATA[key] || { source: key, records: [] };
}

async function loadAll() {
  const entries = await Promise.all(
    Object.entries(SHEET_SOURCES).map(async ([key, cfg]) => {
      const baseUrl = APPS_SCRIPT[cfg.script];
      if (baseUrl && !baseUrl.startsWith("PASTE_")) {
        try {
          const qs = new URLSearchParams({ sheet: cfg.sheet });
          if (cfg.headerRows) qs.set("headerRows", cfg.headerRows);
          const res = await fetch(`${baseUrl}?${qs.toString()}`, { cache: "no-store" });
          const json = await res.json();
          if (!json.error) return [key, json];
          console.warn(`[Apps Script] ${key}: ${json.error}`);
        } catch (e) {
          console.warn(`[Apps Script] fetch gagal utk ${key}, pakai fallback:`, e);
        }
      }
      return [key, await loadFallback(key)];
    })
  );
  DB = Object.fromEntries(entries);
}

// ---------------- helpers ----------------
const g = (rec, key, fallback = "—") => {
  if (!rec) return fallback;
  const v = rec[key];
  if (v === undefined || v === null || v === "") return fallback;
  return v;
};

function fmtDate(v) {
  if (!v || v === "—") return "—";
  const d = new Date(v);
  if (isNaN(d)) return String(v);
  return d.toLocaleDateString("id-ID", { day: "2-digit", month: "long", year: "numeric" });
}

function stamp(disposisi) {
  const val = (disposisi || "").toString().toLowerCase();
  if (val.includes("lulus")) return `<span class="stamp pass">Diluluskan</span>`;
  if (val.includes("karantina")) return `<span class="stamp hold">Dikarantina</span>`;
  if (val.includes("tolak")) return `<span class="stamp fail">Ditolak</span>`;
  return `<span class="stamp none">Belum diperiksa</span>`;
}

// Baris KESIMPULAN di formulir cetak (PDF/Word): tampilkan ketiga pilihan
// "Diluluskan/Dikarantina/Ditolak" seperti dokumen kertas asli, dengan 2
// pilihan yang tidak berlaku dicoret (strikethrough) mengikuti hasil kolom
// Disposisi. Kalau Disposisi masih kosong (belum diperiksa), tampilkan
// ketiganya apa adanya tanpa coretan.
function kesimpulanStrike(disposisi) {
  const val = (disposisi || "").toString().toLowerCase();
  const options = [
    { text: "Diluluskan", match: val.includes("lulus") },
    { text: "Dikarantina", match: val.includes("karantina") },
    { text: "Ditolak", match: val.includes("tolak") },
  ];
  const decided = options.some((o) => o.match);
  if (!decided) return options.map((o) => o.text).join("/");
  return options
    .map((o) => (o.match ? `<b>${o.text}</b>` : `<s>${o.text}</s>`))
    .join("/");
}

function findBy(records, key, value) {
  if (!records || !value || value === "—") return null;
  return records.find((r) => String(r[key] ?? "").trim() === String(value).trim()) || null;
}

// Parses "DD-MM-YYYY" (format kolom TANGGAL ISI/BERLAKU di sheet RnD).
function parseIdDate(s) {
  const m = /^(\d{2})-(\d{2})-(\d{4})$/.exec(String(s || "").trim());
  if (!m) return null;
  return new Date(`${m[3]}-${m[2]}-${m[1]}`);
}

// Cari spesifikasi acuan: utamakan cocok persis nomor dokumen acuan (unik per
// revisi). Kalau nomor dokumen kosong/tidak ketemu, fallback ke kode + ambil
// revisi ter-approve paling baru (sheet RnD bisa punya banyak baris riwayat
// revisi untuk kode yang sama).
function findSpec(records, { docKey, docValue, codeKey, codeValue }) {
  if (!records || !records.length) return null;
  if (docValue && docValue !== "—") {
    const hit = records.find((r) => String(r[docKey] ?? "").trim() === String(docValue).trim());
    if (hit) return hit;
  }
  if (!codeValue || codeValue === "—") return null;
  const candidates = records.filter((r) => String(r[codeKey] ?? "").trim() === String(codeValue).trim());
  if (!candidates.length) return null;
  const approved = candidates.filter((r) => /approved/i.test(r["STATUS"] || ""));
  const pool = approved.length ? approved : candidates;
  return pool.sort((a, b) => {
    const da = parseIdDate(a["TANGGAL BERLAKU (ISI)"]) || new Date(0);
    const db = parseIdDate(b["TANGGAL BERLAKU (ISI)"]) || new Date(0);
    return db - da;
  })[0];
}

// Status checklist/approval QC Supervisor: satu-satunya kolom boolean di semua
// sheet Report Tahunan QC adalah "Disetujui oleh QC Section Head" (nama kolom
// kadang ada spasi di belakangnya). Kalau di organisasi kamu checklist ini
// sebetulnya peran "QC Supervisor" yang terpisah dari "QC Section Head",
// beri tahu saya nama kolom yang benar supaya disesuaikan.
function isApproved(rec) {
  if (!rec) return false;
  for (const k of Object.keys(rec)) {
    if (/disetujui oleh qc/i.test(k)) {
      const v = rec[k];
      return v === true || v === "TRUE" || v === "true" || v === 1 || v === "1";
    }
  }
  return false;
}

// Catatan Pengambilan Sampel Bahan Baku: baris-baris dengan Tanggal Sampling
// yang SAMA masuk ke 1 formulir yang sama (nomor urut lanjut, "Tanggal
// Sampling" ditulis sekali di atas tabel). Tanggal Sampling yang BEDA jadi
// formulir terpisah. Kalau baris dalam 1 tanggal lebih banyak dari muatan 1
// halaman (mengikuti template asli: 12 baris data per halaman), SATU formulir
// itu jadi beberapa halaman (kop "Halaman X dari Y" menyesuaikan per halaman)
// tapi tetap 1 dokumen/unduhan yang sama -- bukan file terpisah per halaman.
const SAMPLING_ROWS_PER_PAGE = 12;

function buildSamplingPages() {
  const records = DB.incoming_bb?.records || [];
  const groups = new Map();
  records.forEach((r) => {
    const key = String(g(r, "Tanggal Sampling", "—"));
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(r);
  });
  const result = [];
  for (const [tanggalSampling, items] of groups.entries()) {
    const totalPages = Math.max(1, Math.ceil(items.length / SAMPLING_ROWS_PER_PAGE));
    const approved = items.length > 0 && items.every((it) => isApproved(it));
    const pages = [];
    for (let p = 0; p < totalPages; p++) {
      pages.push({
        items: items.slice(p * SAMPLING_ROWS_PER_PAGE, (p + 1) * SAMPLING_ROWS_PER_PAGE),
        startNo: p * SAMPLING_ROWS_PER_PAGE + 1,
        pageIndex: p + 1,
      });
    }
    result.push({
      "Tanggal Sampling": tanggalSampling,
      "Disetujui oleh QC Section Head": approved,
      _pages: pages,
      _totalPages: totalPages,
      _groupCount: items.length,
      _id: tanggalSampling,
    });
  }
  return result;
}

// Catatan Pengambilan Sampel Produk Jadi: sama seperti buildSamplingPages() di
// atas, tapi dikelompokkan per (Tanggal Sampling, Metode Sampling), dan
// formulir aslinya memuat 5 baris data per halaman (bukan 12).
const SAMPEL_JADI_ROWS_PER_PAGE = 5;

function buildSampelJadiPages() {
  const records = DB.sampel_jadi?.records || [];
  const groups = new Map();
  records.forEach((r) => {
    const key = `${g(r, "Tanggal Sampling", "—")}__${g(r, "Metode Sampling", "—")}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(r);
  });
  const result = [];
  for (const [key, items] of groups.entries()) {
    const totalPages = Math.max(1, Math.ceil(items.length / SAMPEL_JADI_ROWS_PER_PAGE));
    const pages = [];
    for (let p = 0; p < totalPages; p++) {
      pages.push({
        items: items.slice(p * SAMPEL_JADI_ROWS_PER_PAGE, (p + 1) * SAMPEL_JADI_ROWS_PER_PAGE),
        startNo: p * SAMPEL_JADI_ROWS_PER_PAGE + 1,
        pageIndex: p + 1,
      });
    }
    const approved = items.length > 0 && items.every((it) => isApproved(it));
    result.push({
      "Tanggal Sampling": items[0]["Tanggal Sampling"],
      "Metode Sampling": items[0]["Metode Sampling"],
      "Disetujui oleh QC Section Head": approved,
      _pages: pages,
      _totalPages: totalPages,
      _groupCount: items.length,
      _id: key,
    });
  }
  return result;
}

// Catatan Pengambilan Sampel Bahan Kemas: sama polanya dgn buildSamplingPages()
// (dikelompokkan per Tanggal Sampling), tapi formulir aslinya memuat 14 baris
// data per halaman (bukan 12), dan tidak ada kolom No. Batch.
const SAMPLING_KEMAS_ROWS_PER_PAGE = 14;

function buildSampelKemasPages() {
  const records = DB.sampel_bahan_kemas?.records || [];
  const groups = new Map();
  records.forEach((r) => {
    const key = String(g(r, "Tanggal Sampling", "—"));
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(r);
  });
  const result = [];
  for (const [tanggalSampling, items] of groups.entries()) {
    const totalPages = Math.max(1, Math.ceil(items.length / SAMPLING_KEMAS_ROWS_PER_PAGE));
    const pages = [];
    for (let p = 0; p < totalPages; p++) {
      pages.push({
        items: items.slice(p * SAMPLING_KEMAS_ROWS_PER_PAGE, (p + 1) * SAMPLING_KEMAS_ROWS_PER_PAGE),
        startNo: p * SAMPLING_KEMAS_ROWS_PER_PAGE + 1,
        pageIndex: p + 1,
      });
    }
    result.push({
      "Tanggal Sampling": tanggalSampling,
      _pages: pages,
      _totalPages: totalPages,
      _groupCount: items.length,
      _id: tanggalSampling,
    });
  }
  return result;
}

// Membungkus setiap <table class="form-table"> dengan div scroll-horizontal,
// diterapkan generik ke SEMUA dokumen (bukan per-dokumen) supaya tabel kolom
// banyak (mis. IPC Filling 17 kolom) tidak kepepet/berantakan di layar sempit.
function wrapWideTables(container) {
  container.querySelectorAll("table.form-table").forEach((t) => {
    if (t.parentElement.classList.contains("table-scroll")) return;
    const wrap = document.createElement("div");
    wrap.className = "table-scroll";
    t.parentNode.insertBefore(wrap, t);
    wrap.appendChild(t);
  });
}

// Saat export (PDF/Word), sementara matikan batas scroll supaya tabel lebar
// ikut tercetak penuh, bukan terpotong sebatas area yang kelihatan di layar.
function withTablesExpanded(el, fn) {
  const wraps = Array.from(el.querySelectorAll(".table-scroll"));
  wraps.forEach((w) => (w.style.overflowX = "visible"));
  try {
    return fn();
  } finally {
    wraps.forEach((w) => (w.style.overflowX = ""));
  }
}

function checklistBadge(rec) {
  return isApproved(rec)
    ? '<span class="check-badge checked">&#10003; Checklist QC Supervisor</span>'
    : '<span class="check-badge unchecked">Belum Checklist</span>';
}

// Kop resmi: logo (kiri) + FORMULIR/Halaman (kanan atas) + judul 14pt/info dokumen
// (kanan bawah) + baris BAGIAN QUALITY CONTROL, meniru layout dokumen Word asli.
function renderKop(doc, halamanIdx, totalOverride) {
  const total = totalOverride || (doc.meta && doc.meta.halamanTotal) || 1;
  const infoRows = [
    ["No. Dokumen", esc(doc.docNo)],
    ["Tanggal Berlaku", esc((doc.meta && doc.meta.tanggalBerlaku) || "-")],
    ["Menggantikan", esc((doc.meta && doc.meta.menggantikan) || "-")],
    ["Tanggal", esc((doc.meta && doc.meta.tanggalSebelumnya) || "-")],
  ]
    .map(
      ([label, value]) => `<tr>
        <td class="kop-info-label">${label}</td>
        <td class="kop-info-colon">:</td>
        <td class="kop-info-value">${value}</td>
      </tr>`
    )
    .join("");
  return `<table class="kop">
    <tr>
      <td class="kop-logo" rowspan="2"><img src="${LOGO_DATA_URL}" alt="Logo CSE" /></td>
      <td class="kop-formulir">FORMULIR</td>
      <td class="kop-halaman">Halaman ${halamanIdx} dari ${total}</td>
    </tr>
    <tr>
      <td class="kop-title">${esc(doc.label.toUpperCase())}</td>
      <td class="kop-info">
        <table class="kop-info-table">${infoRows}</table>
      </td>
    </tr>
    <tr><td colspan="3" class="kop-bagian">BAGIAN QUALITY CONTROL</td></tr>
  </table>`;
}

function renderSignatures(sigs) {
  if (!sigs || !sigs.length) return "";
  const alignClass = sigs.length >= 2 ? "sign-block-center" : "sign-block-right";
  return (
    `<div class="sign-block ${alignClass}">` +
    sigs
      .map(
        (s) => `<div class="sign-col">
      <div>${esc(s.label)}</div>
      <div class="sign-space"></div>
      <div>(${esc(s.role || "…………………………..")})</div>
    </div>`
      )
      .join("") +
    `</div>`
  );
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ---------------- routing & rendering ----------------

function parseHash() {
  const h = location.hash.replace(/^#\/?/, "");
  const [docKey, id] = h.split("/").map((s) => decodeURIComponent(s || ""));
  return { docKey: docKey || "", id: id || "" };
}

function renderSidebar(activeKey) {
  const groups = {};
  Object.entries(DOCS).forEach(([key, doc]) => {
    groups[doc.group] = groups[doc.group] || [];
    groups[doc.group].push([key, doc]);
  });
  const groupHtml = Object.entries(groups)
    .map(
      ([group, docs]) => `
      <div class="nav-group">
        <h4>${esc(group)}</h4>
        ${docs
          .map(
            ([key, doc]) =>
              `<a class="nav-link ${key === activeKey ? "active" : ""}" href="#/${key}">${esc(doc.label)}</a>`
          )
          .join("")}
      </div>`
    )
    .join("");
  document.getElementById("sidebar").innerHTML = `
    <div class="brand">QC Portal<small>REPORT TAHUNAN QC · LIVE DARI GOOGLE SHEETS</small></div>
    <div class="nav-group"><h4>Ringkasan</h4><a class="nav-link ${!activeKey ? "active" : ""}" href="#/">Dashboard</a></div>
    ${groupHtml}
  `;
}

function renderDashboard() {
  const liveConfigured = Object.values(APPS_SCRIPT).every((u) => u && !u.startsWith("PASTE_"));
  const demoBanner = liveConfigured
    ? ""
    : `<div class="banner">Mode demo -- menampilkan data contoh (belum tersambung ke Google Sheets). Isi <code>APPS_SCRIPT.QC</code> &amp; <code>APPS_SCRIPT.SPEC</code> di bagian atas script dengan URL Web App Apps Script kamu untuk data live. Lihat instruksi di README / komentar apps-script/Code.gs.</div>`;
  const cards = Object.entries(DOCS)
    .map(([key, doc]) => {
      const n = doc.rows().length;
      return `<a class="card" href="#/${key}" style="text-decoration:none;color:inherit;display:block">
        <div class="n">${n}</div>
        <div class="l">${esc(doc.label)}</div>
      </a>`;
    })
    .join("");
  document.getElementById("main").innerHTML = `
    <div class="page-head">
      <div class="eyebrow">Dashboard</div>
      <h1>Ringkasan Data QC</h1>
      <div class="doc-meta">Sumber: Report Tahunan QC (Google Sheets) &amp; Daftar Spesifikasi RnD</div>
    </div>
    ${demoBanner}
    <div class="grid-cards">${cards}</div>
  `;
}

function renderList(docKey) {
  const doc = DOCS[docKey];
  const rows = doc.rows();
  document.getElementById("main").innerHTML = `
    <div class="page-head">
      <div class="eyebrow">${esc(doc.group)}</div>
      <h1>${esc(doc.label)}</h1>
      <div class="doc-meta">No. Dokumen: ${esc(doc.docNo)}</div>
    </div>
    <div class="toolbar no-print">
      <input type="search" id="q" placeholder="Cari (nama produk, batch, kode)..." />
      <button class="ghost" id="refresh">Muat Ulang Data</button>
    </div>
    <div id="list-wrap"></div>
  `;
  const draw = (filter = "") => {
    const f = filter.trim().toLowerCase();
    const filtered = !f
      ? rows
      : rows.filter((r) => JSON.stringify(r).toLowerCase().includes(f));
    if (!filtered.length) {
      document.getElementById("list-wrap").innerHTML = `<div class="empty-state">Belum ada data${f ? " yang cocok dengan pencarian" : ""}. ${!rows.length ? "Pastikan gid sheet sudah diisi di scripts/config.mjs lalu jalankan sinkronisasi." : ""}</div>`;
      return;
    }
    document.getElementById("list-wrap").innerHTML = `
      <table class="list">
        <thead><tr>${doc.listCols.map(([h]) => `<th>${esc(h)}</th>`).join("")}<th>Checklist</th><th></th></tr></thead>
        <tbody>
          ${filtered
            .map((r, i) => {
              const id = doc.idKey ? g(r, doc.idKey, `row-${i}`) : `row-${i}`;
              return `<tr>
                ${doc.listCols.map(([, fn]) => `<td>${fn(r)}</td>`).join("")}
                <td>${checklistBadge(r)}</td>
                <td><a class="btn" style="padding:5px 10px;font-size:0.78rem;text-decoration:none" href="#/${docKey}/${encodeURIComponent(id === "—" ? `row-${i}` : id)}">Lihat Form</a></td>
              </tr>`;
            })
            .join("")}
        </tbody>
      </table>`;
  };
  draw();
  document.getElementById("q").addEventListener("input", (e) => draw(e.target.value));
  document.getElementById("refresh").addEventListener("click", async () => {
    await loadAll();
    draw(document.getElementById("q").value);
  });
}

// ---------------- export engine (PDF & Word) ----------------
// PDF: merender persis elemen .form-sheet (kop, tabel, tanda tangan) apa adanya
// lewat html2canvas, supaya hasil unduhan identik dengan yang tampil di layar.
// PDF: screenshot PERSIS elemen .form-sheet pakai html2canvas (bukan jsPDF.html()
// yang suka salah tata letak untuk sel rowspan/colspan), lalu tempel gambar itu ke
// PDF per halaman A4. Karena ini screenshot apa adanya, sel yang di-merge di layar
// (mis. kolom "Metode Analisis" atau baris "KESIMPULAN") ikut ke PDF persis mergenya.
// Mekanisme unduh tunggal yang dipakai PDF & Word -- terbukti jalan konsisten
// (anchor + object URL), tidak bergantung pada save()/output bawaan tiap library.
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

// Memaksa border tabel jadi hitam solid via inline style, terlepas dari CSS
// variabel layar (--rule-strong, abu-abu) yang dipakai utk tampilan di browser.
// Dipakai baik utk PDF (html2canvas merender computed style, jadi warna abu-abu
// var(--rule-strong) ikut kefoto kalau tidak ditimpa) maupun Word (mso kadang
// mengabaikan CSS selector majemuk seperti "table.kop td", jadi inline style
// dipakai sebagai jaminan border benar-benar tampil). Sel dalam kop-info-table
// (label/titik dua/nilai di kop surat) sengaja TETAP tanpa border.
function applyPrintBorders(root) {
  root.querySelectorAll("table.kop, table.form-table").forEach((table) => {
    table.querySelectorAll("td, th").forEach((cell) => {
      if (cell.closest("table") !== table) return; // skip sel tabel bersarang
      cell.style.border = "1px solid #000";
      if (!cell.style.padding) cell.style.padding = "4px 8px";
    });
  });
  root.querySelectorAll("table.kop-info-table td").forEach((cell) => {
    cell.style.border = "none";
  });
}

// Sama seperti applyPrintBorders di atas: Word (mso) kadang mengabaikan CSS
// class biasa juga (bukan cuma yg majemuk), jadi font tebal utk label-cell/
// section-bar, rata-tengah utk th, dan indentasi Bentuk/Warna/Bau bisa hilang
// di hasil Word walau muncul benar di PDF/layar. Dipaksa inline di sini khusus
// utk ekspor Word supaya keduanya konsisten.
function applyWordClassStyles(root) {
  root.querySelectorAll("table.form-table th").forEach((cell) => {
    cell.style.fontWeight = "bold";
    if (!cell.style.textAlign) cell.style.textAlign = "center";
  });
  root.querySelectorAll("table.form-table td.label-cell").forEach((cell) => {
    cell.style.fontWeight = "bold";
  });
  root.querySelectorAll("table.form-table th.section-bar, table.form-table td.section-bar").forEach((cell) => {
    cell.style.fontWeight = "bold";
    if (!cell.style.textAlign) cell.style.textAlign = "center";
  });
  root.querySelectorAll("table.form-table td.indent").forEach((cell) => {
    cell.style.paddingLeft = "20pt";
  });
}


// Merender .form-sheet ke canvas TANPA batasan lebar layar/viewport, dengan cara
// meng-clone elemen ke panggung tersembunyi (off-screen). Ini memperbaiki bug
// tabel lebar (mis. sampel-bb 12 kolom, sampel-ruahan halaman Filling 16
// kolom, leak-test 11 kolom) yang sebelumnya kepotong: overflow-x:visible
// saja tidak melebarkan .form-sheet, jadi html2canvas tetap menjepret sesuai
// lebar box aslinya dan sisa tabel yang meluber terpotong.
const FORM_SHEET_DESIGN_WIDTH = { portrait: 794, landscape: 1123 };

async function captureFormSheetCanvas(el, orientation) {
  // BUG FIX: sebelumnya SEMUA tabel (lebar ATAU sempit) dipaksa width:auto +
  // wrapper .table-scroll dipaksa width:max-content tanpa pandang bulu.
  // Efeknya tabel sempit (mis. IPC Mixing 1 baris) malah ikut menyusut
  // sekadar isinya sendiri, jadi lebih sempit dari kop yang tetap width:100%
  // -- keduanya jadi tidak rata/sejajar di hasil PDF walau di layar normal
  // rata. Sekarang perlebaran cuma diterapkan pada tabel yang TERBUKTI
  // meluber (scrollWidth > clientWidth di elemen asli, sebelum di-clone).
  const scrollWraps = Array.from(el.querySelectorAll(".table-scroll"));
  const overflowFlags = scrollWraps.map((w) => w.scrollWidth > w.clientWidth + 1);
  const anyOverflow = overflowFlags.some(Boolean);

  const clone = el.cloneNode(true);
  // "width:max-content" di elemen block (bukan inline-block) supaya wrapper
  // yang memang lebar tetap flow vertikal bertumpuk dgn elemen lain (mis.
  // uji-bb: tabel info + tabel parameter), bukan sejajar horizontal.
  const cloneWraps = Array.from(clone.querySelectorAll(".table-scroll"));
  cloneWraps.forEach((w, i) => {
    if (!overflowFlags[i]) return;
    w.style.overflow = "visible";
    w.style.width = "max-content";
    const t = w.querySelector("table.form-table");
    if (t) t.style.width = "auto";
  });

  if (anyOverflow) {
    // Setidaknya satu tabel butuh ruang ekstra -> seluruh lembar ikut
    // melebar menyesuaikan tabel terlebar (perilaku lama, dipertahankan).
    clone.style.width = "max-content";
  } else {
    // Tidak ada tabel yang meluber -> pertahankan lebar dokumen standar
    // (sama seperti tampilan layar/cetak asli), supaya kop & tabel tetap
    // sama lebar dan rata kiri-kanan.
    clone.style.width = `${FORM_SHEET_DESIGN_WIDTH[orientation] || FORM_SHEET_DESIGN_WIDTH.portrait}px`;
  }
  clone.style.maxWidth = "none";
  // .form-sheet punya border abu-abu tipis + padding hanya utk tampilan "kartu"
  // di layar -- bukan bagian dari dokumen asli, jadi dibuang saat export supaya
  // tidak muncul sebagai garis luar/bingkai tambahan di PDF.
  clone.style.border = "none";
  clone.style.padding = "0";
  // Paksa semua border tabel jadi hitam solid (bukan abu-abu var(--rule-strong)
  // yang dipakai utk tampilan layar), supaya PDF hasil screenshot sama seperti
  // dokumen cetak asli.
  applyPrintBorders(clone);

  const stage = document.createElement("div");
  stage.style.position = "fixed";
  stage.style.top = "0";
  stage.style.left = "-99999px";
  stage.style.width = "max-content";
  stage.style.background = "#ffffff";
  stage.appendChild(clone);
  document.body.appendChild(stage);
  // Paksa reflow & tunggu 1 frame supaya browser benar-benar selesai menata
  // ulang clone (terutama tabel dgn rowspan) sebelum html2canvas membaca
  // ukuran/posisinya -- kalau dibaca terlalu dini, hasilnya bisa salah ukur.
  void clone.offsetHeight;
  await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
  try {
    return await window.html2canvas(clone, {
      scale: 2,
      backgroundColor: "#ffffff",
      windowWidth: clone.scrollWidth,
    });
  } finally {
    stage.remove();
  }
}

async function exportPdf(filenameBase, orientation) {
  const el = document.querySelector(".form-sheet");
  if (!el || !window.jspdf || !window.html2canvas) return;
  const canvas = await captureFormSheetCanvas(el, orientation);
  const { jsPDF } = window.jspdf;
  // Ikuti orientasi asli dokumen (landscape utk tabel lebar, potret utk form
  // sempit) alih-alih selalu dipaksa "p" -- itu penyebab tabel lebar terjepit/kepotong.
  // Instance ini dipakai dulu HANYA utk menghitung lebar halaman A4 acuan
  // (pageW) dan mengecek apakah kontennya muat 1 halaman -- kalau muat,
  // instance final di-rebuild di bawah dgn TINGGI KERTAS CUSTOM pas-konten,
  // supaya form pendek (mis. IPC Mixing 1 baris) tidak menyisakan area kosong
  // raksasa di bawah tanda tangan seperti sebelumnya (PDF selalu dipaksa
  // tinggi A4 penuh walau isinya cuma sepertiga halaman).
  let pdf = new jsPDF(orientation === "landscape" ? "l" : "p", "pt", "a4");
  const pageW = pdf.internal.pageSize.getWidth();
  const pageHA4 = pdf.internal.pageSize.getHeight();
  const margin = 24;
  const usableW = pageW - margin * 2;
  const usableHA4 = pageHA4 - margin * 2;
  const imgW = usableW;
  const imgH = (canvas.height * imgW) / canvas.width;

  if (imgH <= usableHA4) {
    // Muat 1 halaman: bikin ulang dokumen dgn tinggi kertas custom pas-konten
    // (bukan tinggi A4 penuh), supaya tidak ada sisa halaman kosong di bawah
    // tanda tangan.
    pdf = new jsPDF(orientation === "landscape" ? "l" : "p", "pt", [pageW, imgH + margin * 2]);
    pdf.addImage(canvas.toDataURL("image/png"), "PNG", margin, margin, imgW, imgH);
  } else {
    const usableH = usableHA4;
    // Potong canvas jadi beberapa halaman (slice per tinggi halaman) supaya
    // tabel panjang tetap utuh terbaca, tidak dipaksa muat 1 halaman.
    const pageCanvasH = Math.floor((usableH * canvas.width) / imgW);
    let renderedH = 0;
    let first = true;
    while (renderedH < canvas.height) {
      const sliceH = Math.min(pageCanvasH, canvas.height - renderedH);
      const sliceCanvas = document.createElement("canvas");
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = sliceH;
      const ctx = sliceCanvas.getContext("2d");
      ctx.drawImage(canvas, 0, renderedH, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
      const sliceImgH = (sliceH * imgW) / canvas.width;
      if (!first) pdf.addPage();
      pdf.addImage(sliceCanvas.toDataURL("image/png"), "PNG", margin, margin, imgW, sliceImgH);
      renderedH += sliceH;
      first = false;
    }
  }
  downloadBlob(pdf.output("blob"), `${filenameBase}.pdf`);
}

// Bangun blok tanda tangan sebagai TABEL (bukan flexbox) supaya posisinya rata
// kanan konsisten di Word -- Word (mso) tidak mendukung display:flex sama sekali,
// sehingga .sign-block flex sebelumnya jatuh ke tumpukan rata kiri di .doc. Sel
// pertama dibiarkan kosong tanpa lebar supaya melebar mengisi sisa baris dan
// mendorong kolom tanda tangan (mis. QC Supervisor) ke sebelah kanan.
function buildSignatureTableHtml(sigs) {
  if (!sigs || !sigs.length) return "";
  const cols = sigs
    .map(
      (s) => `<td style="width:220px;text-align:center;vertical-align:top;padding:0 15px;">
        <div>${esc(s.label)}</div>
        <div style="font-size:1pt;line-height:50pt;mso-line-height-rule:exactly;">&nbsp;</div>
        <div>(${esc(s.role || "…………………………..")})</div>
      </td>`
    )
    .join("");
  // 2+ tanda tangan -> tengah (spacer kosong di kiri DAN kanan, lebar sama besar
  // sehingga blok tanda tangan jatuh di tengah). 1 tanda tangan -> tetap rata
  // kanan seperti sebelumnya (spacer kosong hanya di kiri).
  const rightSpacer = sigs.length >= 2 ? "<td>&nbsp;</td>" : "";
  return `<table style="width:100%;border-collapse:collapse;margin-top:40px;" cellpadding="0" cellspacing="0"><tr><td>&nbsp;</td>${cols}${rightSpacer}</tr></table>`;
}

// Word: dibungkus sebagai HTML ber-namespace Word (teknik standar "HTML as .doc"),
// tanpa perlu library tambahan. Font, tabel, dan logo (base64) ikut terbawa persis.
// orientation: "portrait" | "landscape" -- mengikuti format asli tiap formulir
// (mis. tabel log 12 kolom di sampel-bb tetap landscape, bukan dipaksa potret),
// diterapkan lewat @page mso-page-orientation supaya Word membuka dgn ukuran kertas yg benar.
function exportWord(filenameBase, title, orientation, signatures, multiPage) {
  const el = document.querySelector(".form-sheet");
  if (!el) return;
  const landscape = orientation === "landscape";
  const pageSize = landscape ? "841.9pt 595.3pt" : "595.3pt 841.9pt";
  const clone = el.cloneNode(true);
  const signBlock = clone.querySelector(".sign-block");
  if (signBlock) signBlock.outerHTML = buildSignatureTableHtml(signatures);
  // Word (mso) kadang tidak menerapkan CSS selector majemuk seperti
  // "table.kop td, table.form-table td, table.form-table th" dari <style> di
  // <head> -- makanya border bisa hilang total di hasil .doc walau di CSS-nya
  // sudah ada. Inline style di setiap sel jauh lebih bisa diandalkan utk mso.
  applyPrintBorders(clone);
  applyWordClassStyles(clone);

  // Dokumen yang BUKAN multi-halaman manual (bukan sampel-bb dkk yang sudah
  // mem-precompute sendiri per-halaman): kop dipindah jadi RUNNING HEADER Word
  // asli (mso-element:header) dengan field PAGE/NUMPAGES, bukan tabel statis
  // sekali di body. Jadi kalau isinya ternyata meluber ke >1 halaman fisik
  // (mis. Catatan yang panjang), kop + "Halaman X dari Y" tetap otomatis benar
  // di SETIAP halaman -- dihitung Word sendiri, bukan ditebak di awal.
  let headerHtml = "";
  if (!multiPage) {
    const kopEl = clone.querySelector("table.kop");
    if (kopEl) {
      const halamanCell = kopEl.querySelector(".kop-halaman");
      if (halamanCell) {
        halamanCell.innerHTML =
          'Halaman <span style=\'mso-field-code:" PAGE "\'>1</span> dari <span style=\'mso-field-code:" NUMPAGES "\'>1</span>';
      }
      const spacer = kopEl.nextElementSibling;
      headerHtml = `<div style="mso-element:header" id="kopHeader">${kopEl.outerHTML}<p style="margin:0;line-height:8pt;font-size:1pt;">&nbsp;</p></div>`;
      kopEl.remove();
      if (spacer && spacer.tagName === "P" && !spacer.textContent.trim()) spacer.remove();
    }
  }
  // Word kadang mengabaikan margin CSS antar 2 tabel yang bersebelahan, jadi
  // kop & tabel data bisa nempel jadi satu. Sisipkan paragraf spacer eksplisit
  // supaya keduanya pasti terpisah, tidak hanya mengandalkan margin-bottom.
  // (Berlaku utk kop yang MASIH ada di body, mis. tiap halaman di sampel-bb.)
  const kopTables = clone.querySelectorAll("table.kop");
  kopTables.forEach((kopTable) => kopTable.insertAdjacentHTML("afterend", '<p style="margin:0;line-height:14pt;font-size:1pt;">&nbsp;</p>'));
  const html = withTablesExpanded(clone, () => `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
  <head><meta charset="utf-8"><title>${esc(title)}</title>
  <!--[if gte mso 9]><xml>
  <w:WordDocument>
    <w:View>Print</w:View>
    <w:DoNotOptimizeForBrowser/>
  </w:WordDocument>
  </xml><![endif]-->
  <style>
    @page Section1 { size: ${pageSize}; mso-page-orientation: ${landscape ? "landscape" : "portrait"}; margin: 42pt 34pt; ${headerHtml ? "mso-header: kopHeader; mso-header-margin: 20pt;" : ""} }
    div.Section1 { page: Section1; }
    body { font-family:'Times New Roman', Times, serif; font-size:11pt; mso-para-margin:0in; mso-para-margin-bottom:.0001pt; }
    /* Word (mso) menambahkan "space after paragraph" bawaan style Normal walau
       margin di CSS sudah 0 -- mso-para-margin di atas + reset "p" di bawah ini
       mematikannya secara global (termasuk paragraf otomatis di dalam sel
       tabel) supaya jarak antar elemen tetap rapat dan TIDAK memaksa dokumen
       yang seharusnya muat 1 halaman jadi meluber ke halaman berikutnya. */
    p { margin:0in; margin-bottom:.0001pt; mso-margin-top-alt:auto; mso-margin-bottom-alt:auto; }
    td { mso-para-margin:0in; mso-para-margin-bottom:.0001pt; }
    table { border-collapse:collapse; width:100%; }
    table.kop { margin-bottom: 16pt; }
    table.form-table { margin-bottom: 14pt; }
    table.kop td, table.form-table td, table.form-table th { border:1px solid #000; padding:4px 8px; vertical-align:top; }
    table.kop td.kop-logo{vertical-align:top;}
    .kop-title{font-size:14pt;font-weight:bold;text-align:center;}
    .kop-formulir{font-size:14pt;font-weight:bold;text-align:center;}
    .kop-bagian{font-weight:bold;text-align:center;}
    .kop-halaman{font-weight:bold;text-align:center;}
    .kop-info-table td{border:none !important;padding:0 4px 0 0;white-space:nowrap;}
    .kop-info-table td.kop-info-colon{padding:0 6px;}
    .kop-info-table td.kop-info-value{white-space:normal;}
    /* Kelas-kelas ini ada di CSS layar/PDF tapi sebelumnya tidak ikut disalin ke
       <style> khusus Word ini -- makanya label tebal, KESIMPULAN tebal+tengah,
       dan indentasi Bentuk/Warna/Bau hilang di hasil Word walau muncul benar di
       PDF. Disamakan di sini supaya kedua hasil ekspor konsisten. */
    table.form-table th { font-weight:bold; text-align:center; }
    table.form-table td.label-cell { font-weight:bold; }
    table.form-table th.section-bar, table.form-table td.section-bar { font-weight:bold; text-align:center; }
    table.form-table td.indent { padding-left:20pt; }
  </style>
  </head><body>${headerHtml}<div class="Section1">${clone.innerHTML}</div></body></html>`);
  const blob = new Blob(["\ufeff", html], { type: "application/msword" });
  downloadBlob(blob, `${filenameBase}.doc`);
}

function renderDetail(docKey, id) {
  const doc = DOCS[docKey];
  const rows = doc.rows();
  let row;
  if (id.startsWith("row-")) {
    row = rows[parseInt(id.replace("row-", ""), 10)];
  } else {
    row = findBy(rows, doc.idKey, id) || rows.find((_, i) => `row-${i}` === id);
  }
  if (!row) {
    document.getElementById("main").innerHTML = `<div class="empty-state">Data tidak ditemukan. <a href="#/${docKey}">Kembali ke daftar</a></div>`;
    return;
  }
  const approved = isApproved(row);
  const halamanIdx = doc.halamanIdx ? doc.halamanIdx(row) : 1;
  const halamanTotalDyn = typeof doc.halamanTotal === "function" ? doc.halamanTotal(row) : null;
  const filenameBase = `${docKey}-${(doc.idKey ? g(row, doc.idKey, id) : id).toString().replace(/[^a-z0-9-]+/gi, "_")}`;
  const lockNote = approved
    ? ""
    : `<div class="export-note">Dokumen ini belum di-checklist QC Supervisor, jadi hanya bisa dilihat. Unduh PDF/Word aktif otomatis setelah kolom persetujuan di sheet terisi TRUE/checklist.</div>`;

  const orientation = typeof doc.orientation === "function" ? doc.orientation(row, halamanIdx) : doc.orientation || "portrait";
  const bodyHtml = doc.multiPage
    ? doc.detail(row)
    : `${renderKop(doc, halamanIdx, halamanTotalDyn)}${doc.detail(row)}${renderSignatures(doc.signatures)}`;
  document.getElementById("main").innerHTML = `
    <div class="page-head no-print">
      <div class="eyebrow"><a href="#/${docKey}">&larr; ${esc(doc.label)}</a></div>
    </div>
    <div class="toolbar no-print" style="align-items:flex-start">
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button id="dl-pdf" ${approved ? "" : "disabled"} title="${approved ? "Unduh sebagai PDF" : "Terkunci -- dokumen belum di-checklist QC Supervisor"}">Unduh PDF</button>
          <button id="dl-word" class="ghost" ${approved ? "" : "disabled"} title="${approved ? "Unduh sebagai Word (.doc)" : "Terkunci -- dokumen belum di-checklist QC Supervisor"}">Unduh Word</button>
        </div>
        ${lockNote}
      </div>
    </div>
    <div class="form-sheet orientation-${orientation}">
      ${bodyHtml}
    </div>
  `;
  if (approved) {
    document.getElementById("dl-pdf").addEventListener("click", () => exportPdf(filenameBase, orientation));
    document.getElementById("dl-word").addEventListener("click", () => exportWord(filenameBase, doc.label, orientation, doc.signatures, !!doc.multiPage));
  }
  wrapWideTables(document.querySelector(".form-sheet"));
}

function router() {
  const { docKey, id } = parseHash();
  renderSidebar(docKey in DOCS ? docKey : "");
  if (!docKey) return renderDashboard();
  if (!(docKey in DOCS)) return renderDashboard();
  if (id) return renderDetail(docKey, id);
  return renderList(docKey);
}

window.addEventListener("hashchange", router);
loadAll().then(router);

</script>
